---
layout: default
---

<article class="question-page">

  <div class="question-meta">
    <strong>ID_{{ page.question_id }}</strong> &nbsp;|&nbsp;
    Domain: <strong>{{ page.category | capitalize }}</strong> &nbsp;|&nbsp;
    Level: <span class="badge badge-{{ page.level }}">{{ page.level }}</span>
  </div>

  <h1 style="margin-top: 20px; font-size: 2.2rem;">{{ page.title }}</h1>

  <div class="question-content">
    {{ content }}
  </div>

  <div style="margin-top: 40px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.1);">
    <a href="{{ site.baseurl }}/{{ page.category }}/{{ page.level }}/" style="color: #06b6d4; text-decoration: none; font-weight: bold;">
      ← Return to {{ page.category | capitalize }} ({{ page.level | capitalize }})
    </a>
  </div>

</article>
