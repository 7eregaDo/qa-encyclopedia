{% assign q = site.questions | where: "question_id", include.id | first %}

{% if q %}
<div class="question-card">

  <div class="question-header">
    <span class="question-number">Q{{ q.question_id }}</span>
    <h3>{{ q.title }}</h3>
  </div>

  <div class="question-theory">
    <strong>Theory:</strong>
    <p>{{ q.theory | default: "N/A" }}</p>
  </div>

  <div class="question-content">
    {{ q.content | markdownify }}
  </div>

  <div class="question-footer">
    <a href="{{ q.url }}">View full answer →</a>
  </div>

</div>
{% endif %}
